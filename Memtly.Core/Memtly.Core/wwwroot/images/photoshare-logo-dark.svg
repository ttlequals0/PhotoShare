<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" role="img" aria-label="Photoshare logo">
  <defs>
    <radialGradient id="heroGlow" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#cbb7fb" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#1b1938" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lavender" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbb7fb"/>
      <stop offset="100%" stop-color="#714cb6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="440" height="140" rx="16" fill="url(#heroGlow)"/>

  <g transform="translate(24, 28)">
    <rect x="6" y="14" width="60" height="60" rx="12"
          fill="none" stroke="#714cb6" stroke-width="2"
          transform="rotate(-12 36 44)" opacity="0.7"/>
    <rect x="14" y="10" width="60" height="60" rx="12"
          fill="none" stroke="#cbb7fb" stroke-width="2"
          transform="rotate(6 44 40)" opacity="0.85"/>
    <rect x="12" y="14" width="60" height="60" rx="12" fill="#e9e5dd"/>
    <circle cx="42" cy="44" r="14" fill="none" stroke="#1b1938" stroke-width="2.5"/>
    <circle cx="42" cy="44" r="5" fill="url(#lavender)"/>
    <circle cx="60" cy="24" r="2.5" fill="#714cb6"/>
  </g>

  <g transform="translate(132, 0)" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif">
    <text x="0" y="80" font-size="44" font-weight="540" fill="rgba(255,255,255,0.95)" letter-spacing="-1">
      Photo<tspan fill="#cbb7fb">share</tspan>
    </text>
    <text x="2" y="104" font-size="12" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="1.5">
      MEMORIES, TOGETHER
    </text>
  </g>
</svg>
