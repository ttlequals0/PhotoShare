name: Docker Image CI
on:
  push:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Self
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Memtly.Community.sln
        env:
          NUGET_TOKEN: ${{ secrets.NUGET_READ_TOKEN }}

      - name: Test
        run: dotnet test Memtly.Community.sln --configuration Release --no-restore --verbosity normal

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Self
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Memtly.Community/Dockerfile
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/memtly/memtly:ce
            ghcr.io/memtly/memtly:latest
          secrets: |
            nuget_token=${{ secrets.NUGET_READ_TOKEN }}