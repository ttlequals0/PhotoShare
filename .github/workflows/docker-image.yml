name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag to push (e.g. v1.0.0-test). No :latest mutation.'
        required: true
        type: string

env:
  DOCKERHUB_REPO: ttlequals0/photoshare

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore PhotoShare.sln

      - name: Test
        run: dotnet test PhotoShare.sln --configuration Release --no-restore --verbosity normal

  build:
    name: build (linux/amd64)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      pushed: ${{ steps.gate.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || { [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; }; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=ci,enable=${{ steps.gate.outputs.pushed == 'false' }}

      - name: Trivy vuln scan (filesystem)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: table

      - name: Login to Docker Hub
        if: steps.gate.outputs.pushed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push if release)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: PhotoShare/Dockerfile
          push: ${{ steps.gate.outputs.pushed == 'true' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        if: steps.gate.outputs.pushed == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/${{ env.DOCKERHUB_REPO }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
