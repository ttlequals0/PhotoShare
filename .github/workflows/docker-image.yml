name: Docker Image CI
on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout Memtly.Core
        uses: actions/checkout@v4
        with:
          repository: Memtly/Memtly.Core
          token: ${{ secrets.MEMTLY_PAT }}
          path: ../Memtly.Core

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: docker build . --file Memtly.Community/Dockerfile \
          --tag ghcr.io/memtly/memtly:ce \
          --tag ghcr.io/memtly/memtly:latest

      - name: Push the Docker image
        run: |
          docker push ghcr.io/memtly/memtly:ce
          docker push ghcr.io/memtly/memtly:latest
