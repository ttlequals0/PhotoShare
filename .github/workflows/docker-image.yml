name: Docker Image CI
on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Self
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: |
          echo "${{ secrets.NUGET_READ_TOKEN }}" | docker build . \
            --file Memtly.Community/Dockerfile \
            --secret id=nuget_token,src=/dev/stdin \
            --tag ghcr.io/memtly/memtly:ce \
            --tag ghcr.io/memtly/memtly:latest

      - name: Push the Docker image
        run: |
          docker push ghcr.io/memtly/memtly:ce
          docker push ghcr.io/memtly/memtly:latest
